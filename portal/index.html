<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b0d12">
<link rel="manifest" href="/manifest.webmanifest">
<title>Agent OS Engineering Portal</title>
<style>
:root{color-scheme:dark;--bg:#0b0d12;--panel:#141925;--panel2:#10141d;--line:#293042;--text:#edf2fb;--muted:#98a3b8;--accent:#8d9cff;--good:#62d49a;--warn:#ffc96b}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}a{color:inherit}.top{position:sticky;top:0;z-index:3;display:flex;align-items:center;gap:18px;padding:13px 20px;border-bottom:1px solid var(--line);background:#0b0d12ee;backdrop-filter:blur(14px)}.brand{font-weight:800;text-decoration:none;white-space:nowrap}.nav{display:flex;gap:5px;flex:1;overflow:auto}.nav a{padding:7px 10px;color:var(--muted);text-decoration:none;border-radius:8px;white-space:nowrap}.nav a:hover,.nav a.on{color:var(--text);background:var(--panel)}main{max-width:1500px;margin:auto;padding:28px}.hero{display:grid;grid-template-columns:1.5fr 1fr;gap:24px;padding:44px 0 28px}.hero h1{font-size:clamp(38px,5vw,72px);line-height:1.02;margin:.15em 0}.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}.lede{font-size:18px;color:var(--muted);max-width:760px}.card,.metric,.item{background:linear-gradient(180deg,#171c29,#11151e);border:1px solid var(--line);border-radius:14px;padding:16px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric strong{font-size:30px;display:block}.metric span,.small{color:var(--muted)}.actions,.toolbar{display:flex;gap:9px;flex-wrap:wrap}.btn{display:inline-block;text-decoration:none;border:1px solid var(--line);background:var(--panel);padding:9px 12px;border-radius:9px;cursor:pointer;color:var(--text)}.btn.primary{background:var(--accent);color:#090b10;border-color:transparent;font-weight:750}.sectionhead{display:flex;justify-content:space-between;align-items:end;gap:18px;margin:30px 0 12px}.sectionhead h1,.sectionhead h2{margin:0}.toolbar{margin:14px 0}.toolbar input,.toolbar select{background:#0f131c;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:10px;min-height:40px}.toolbar input{min-width:260px;flex:1}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}.item{text-decoration:none}.item:hover{border-color:#55628e}.id{font:12px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--accent)}.pill{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:2px 7px;margin:2px;color:var(--muted);font-size:11px}.pill.live{border-color:#315f49;color:var(--good)}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:13px;background:var(--panel2)}table{width:100%;border-collapse:collapse;min-width:1000px}th,td{padding:10px 12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{position:sticky;top:0;background:#111620;color:var(--muted);font-size:12px;z-index:1}.empty{padding:40px;text-align:center;color:var(--muted)}.notice{border-left:3px solid var(--accent);padding:10px 14px;background:var(--panel);color:var(--muted);margin:12px 0}.gantt{border:1px solid var(--line);border-radius:13px;overflow:auto;background:var(--panel2)}.gantt-head,.gantt-row{display:grid;grid-template-columns:minmax(260px,34%) minmax(760px,66%);min-width:1080px}.gantt-head{position:sticky;top:0;z-index:2;background:#111620;color:var(--muted);border-bottom:1px solid var(--line)}.gantt-row{border-bottom:1px solid var(--line)}.gantt-label,.gantt-track{padding:9px 12px}.gantt-label strong{display:block}.gantt-track{position:relative;min-height:50px;background-image:linear-gradient(to right,transparent calc(25% - 1px),#222938 25%,transparent calc(25% + 1px),transparent calc(50% - 1px),#222938 50%,transparent calc(50% + 1px),transparent calc(75% - 1px),#222938 75%,transparent calc(75% + 1px))}.gantt-bar{position:absolute;height:18px;top:16px;background:var(--accent);border-radius:5px;min-width:3px}.gantt-bar.live{background:var(--good)}.gantt-dates{position:absolute;top:1px;font-size:10px;color:var(--muted)}.count{font-variant-numeric:tabular-nums}.error{color:#ff9d9d}.loading{opacity:.75}.footer{margin:48px 0 20px;color:var(--muted);font-size:12px}.nowrap{white-space:nowrap}@media(max-width:760px){main{padding:16px}.top{padding:10px;gap:8px}.hero{grid-template-columns:1fr;padding-top:20px}.metrics{grid-template-columns:repeat(2,1fr)}.toolbar input{min-width:100%}.gh{display:none}.sectionhead{align-items:flex-start;flex-direction:column}.gantt-head,.gantt-row{grid-template-columns:230px 760px}}
</style>
</head>
<body>
<header class="top"><a class="brand" href="#home">Agent OS</a><nav class="nav"><a href="#wiki">Wiki</a><a href="#tasks">Tasks</a><a href="#gantt">Gantt</a><a href="#api">API</a></nav><a class="gh" id="repo-link" href="#">GitHub ↗</a></header>
<main id="app"><div class="empty loading">Loading public project data…</div></main>
<script>
const candidates=['alex-mextner/AgentOS','alex-mextner/HyperOS'];
let R=candidates[0],issues=[],planTasks=[],loadError='';
const app=document.querySelector('#app');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const idFromTitle=title=>(String(title).match(/\[(AOS-[A-Z0-9-]+)\]/)||[])[1]||'';
function parseCSV(text){
  const rows=[];let row=[],field='',quoted=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(quoted){if(c==='"'&&text[i+1]==='"'){field+='"';i++}else if(c==='"'){quoted=false}else field+=c}
    else if(c==='"'){quoted=true}else if(c===','){row.push(field);field=''}else if(c==='\n'){row.push(field.replace(/\r$/,''));rows.push(row);row=[];field=''}else field+=c;
  }
  if(field||row.length){row.push(field.replace(/\r$/,''));rows.push(row)}
  if(!rows.length)return[];
  const headers=rows.shift().map((h,i)=>i===0?h.replace(/^\uFEFF/,''):h);
  return rows.filter(r=>r.some(Boolean)).map(r=>Object.fromEntries(headers.map((h,i)=>[h,r[i]??''])));
}
async function resolveRepo(){for(const repo of candidates){const r=await fetch('https://api.github.com/repos/'+repo);if(r.ok){R=repo;break}}document.querySelector('#repo-link').href='https://github.com/'+R}
async function fetchIssues(){const all=[];for(let page=1;page<=10;page++){const r=await fetch(`https://api.github.com/repos/${R}/issues?state=all&per_page=100&page=${page}`);if(!r.ok)throw new Error('GitHub Issues API '+r.status);const xs=(await r.json()).filter(x=>!x.pull_request);all.push(...xs);if(xs.length<100)break}return all}
async function fetchCatalog(){
  const url=`https://raw.githubusercontent.com/${R}/main/data/tasks.csv.gz`;
  const response=await fetch(url,{cache:'no-store'});if(!response.ok)throw new Error('Task catalog '+response.status);
  if(!('DecompressionStream' in window))throw new Error('This browser does not support gzip streaming');
  const text=await new Response(response.body.pipeThrough(new DecompressionStream('gzip'))).text();
  return parseCSV(text);
}
async function boot(){
  await resolveRepo();
  const results=await Promise.allSettled([fetchIssues(),fetchCatalog()]);
  if(results[0].status==='fulfilled')issues=results[0].value;else loadError+=results[0].reason.message+'; ';
  if(results[1].status==='fulfilled')planTasks=results[1].value;else loadError+=results[1].reason.message+'; ';
  route();
}
function issueMap(){return new Map(issues.map(x=>[idFromTitle(x.title),x]).filter(([id])=>id))}
function gh(path=''){return 'https://github.com/'+R+path}
function nav(v){document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('on',a.hash==='#'+v))}
function errorNote(){return loadError?`<div class="notice error">Some live data could not be loaded: ${esc(loadError)}</div>`:''}
function home(){nav('home');app.innerHTML=`<section class="hero"><div><div class="eyebrow">Public · Git-backed · API-first</div><h1>Public engineering workspace for Agent OS.</h1><p class="lede">Open specifications, a complete task catalog, live GitHub Issues, evidence records and schedule views for the Rust-first microkernel programme.</p><div class="actions"><a class="btn primary" href="#wiki">Read the Wiki</a><a class="btn" href="#tasks">Explore tasks</a></div></div><aside class="card"><div class="eyebrow">Architecture rule</div><h2>Owned native stack</h2><p class="small">Android and Linux are isolated to Pixel 9 evidence and bring-up work. Performance-sensitive device paths use shared or DMA-capable buffers rather than generic payload translation.</p></aside></section>${errorNote()}<section class="metrics"><div class="metric"><strong>141</strong><span>planned documents</span></div><div class="metric"><strong class="count">${planTasks.length||327}</strong><span>catalog work items</span></div><div class="metric"><strong class="count">${issues.length}</strong><span>live GitHub issues</span></div><div class="metric"><strong>9</strong><span>implementation phases</span></div></section><div class="footer">GitHub is the source of truth for mutable work. The compressed task catalog is a versioned planning and recovery projection.</div>`}
const docs=[['AOS-BRIEFING','Executive briefing','Programme scope and architectural baseline','BRIEFING.md'],['AOS-INDEX','Documentation index','Cross-linked index of the engineering corpus','docs/INDEX.md'],['AOS-ARCH-001','Portable system architecture','Native portable layer and performance boundaries','docs/architecture/ARCH-001-portable-system-architecture.md'],['AOS-ARCH-002','Microkernel','Kernel object, scheduling and isolation model','docs/architecture/ARCH-002-microkernel.md'],['AOS-HW-001','Hardware portfolio','Open boards, Pixel 9 and later device tracks','docs/hardware/HW-001-target-portfolio.md'],['AOS-PLAN-002','Roadmap and Gantt','Nine implementation phases and dependencies','docs/planning/PLAN-002-roadmap-and-gantt.md'],['AOS-GLOSSARY','Glossary','Detailed engineering terminology index','docs/glossary/GLOSSARY.md']];
function wiki(){nav('wiki');app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">Canonical Markdown</div><h1>Wiki</h1></div><a class="btn" href="${gh('/tree/main/knowledge')}">Browse source ↗</a></div><div class="grid">${docs.map(d=>`<a class="item" href="${gh('/blob/main/knowledge/'+d[3])}"><span class="id">${d[0]}</span><h3>${d[1]}</h3><p class="small">${d[2]}</p></a>`).join('')}</div><div class="footer">Edit through GitHub or any Markdown editor. Stable AOS IDs preserve links across publication formats.</div>`}
function taskRows(filters){
  const live=issueMap();
  return planTasks.filter(t=>{
    const text=[t.task_id,t.title,t.summary,t.description,t.track,t.workstream,t.implementation_phase,t.documentation_volume].join(' ').toLowerCase();
    return(!filters.q||text.includes(filters.q.toLowerCase()))&&(!filters.phase||t.implementation_phase===filters.phase)&&(!filters.track||t.track===filters.track)&&(!filters.state||((live.get(t.task_id)?.state||'planned')===filters.state));
  }).map(t=>({...t,issue:live.get(t.task_id)}));
}
function unique(field){return [...new Set(planTasks.map(x=>x[field]).filter(Boolean))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}))}
function tasks(){
  nav('tasks');
  const phases=unique('implementation_phase'),tracks=unique('track');
  app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">Catalog + GitHub Issues</div><h1>Tasks</h1></div><a class="btn primary" href="${gh('/issues/new/choose')}">New live task ↗</a></div>${errorNote()}<div class="toolbar"><input id="q" placeholder="Search ${planTasks.length||327} tasks"><select id="phase"><option value="">All phases</option>${phases.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="track"><option value="">All tracks</option>${tracks.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="st"><option value="">All states</option><option>planned</option><option>open</option><option>closed</option></select></div><div id="task-count" class="small"></div><div class="tablewrap"><table><thead><tr><th>ID</th><th>Task</th><th>State</th><th>Phase / track</th><th>Dates</th><th>Priority</th></tr></thead><tbody id="rows"></tbody></table></div>`;
  const f={q:'',phase:'',track:'',state:''};
  const draw=()=>{const xs=taskRows(f);document.querySelector('#task-count').textContent=`${xs.length} matching tasks`;document.querySelector('#rows').innerHTML=xs.slice(0,500).map(t=>`<tr><td class="id nowrap">${esc(t.task_id)}</td><td><strong>${t.issue?`<a href="${t.issue.html_url}">${esc(t.title)}</a>`:esc(t.title)}</strong><div class="small">${esc((t.summary||t.description||'').slice(0,220))}</div></td><td>${t.issue?`<span class="pill live">${t.issue.state} #${t.issue.number}</span>`:'<span class="pill">planned</span>'}</td><td>${esc(t.implementation_phase||'—')}<div class="small">${esc(t.track||'')}</div></td><td class="nowrap">${esc(t.start_date||'—')}<br>${esc(t.target_date||'—')}</td><td>${esc(t.priority||'—')}</td></tr>`).join('')||'<tr><td colspan="6" class="empty">No matching tasks.</td></tr>'};
  for(const id of ['q','phase','track','st'])document.querySelector('#'+id).addEventListener(id==='q'?'input':'change',e=>{f[id==='st'?'state':id]=e.target.value;draw()});draw();
}
function toTime(s){const n=Date.parse(s);return Number.isFinite(n)?n:null}
function gantt(){
  nav('gantt');const phases=unique('implementation_phase'),tracks=unique('track');
  app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">Task-level schedule</div><h1>Gantt</h1></div><a class="btn" href="${gh('/projects')}">GitHub Projects ↗</a></div>${errorNote()}<div class="toolbar"><input id="gq" placeholder="Search scheduled tasks"><select id="gphase"><option value="">All phases</option>${phases.map(x=>`<option>${esc(x)}</option>`).join('')}</select><select id="gtrack"><option value="">All tracks</option>${tracks.map(x=>`<option>${esc(x)}</option>`).join('')}</select></div><div id="gcount" class="small"></div><div class="gantt"><div class="gantt-head"><div class="gantt-label">Task</div><div class="gantt-track">Schedule baseline</div></div><div id="grows"></div></div><div class="footer">Bars use the catalog baseline. Green indicates a matching live GitHub Issue. Project v2 dates will supersede catalog dates after the project-scoped import.</div>`;
  const f={q:'',phase:'',track:''},live=issueMap();
  const draw=()=>{let xs=planTasks.filter(t=>toTime(t.start_date)&&toTime(t.target_date)&&(!f.q||[t.task_id,t.title,t.summary].join(' ').toLowerCase().includes(f.q.toLowerCase()))&&(!f.phase||t.implementation_phase===f.phase)&&(!f.track||t.track===f.track));xs=xs.sort((a,b)=>toTime(a.start_date)-toTime(b.start_date));const min=Math.min(...xs.map(x=>toTime(x.start_date))),max=Math.max(...xs.map(x=>toTime(x.target_date))),span=Math.max(1,max-min);document.querySelector('#gcount').textContent=`${xs.length} scheduled tasks · ${xs[0]?.start_date||'—'} to ${xs.at(-1)?.target_date||'—'}`;document.querySelector('#grows').innerHTML=xs.map(t=>{const left=(toTime(t.start_date)-min)/span*100,width=Math.max(.4,(toTime(t.target_date)-toTime(t.start_date))/span*100);const issue=live.get(t.task_id);return`<div class="gantt-row"><div class="gantt-label"><span class="id">${esc(t.task_id)}</span><strong>${issue?`<a href="${issue.html_url}">${esc(t.title)}</a>`:esc(t.title)}</strong><span class="small">${esc(t.implementation_phase||'')} · ${esc(t.track||'')}</span></div><div class="gantt-track"><span class="gantt-dates" style="left:${Math.min(96,left)}%">${esc(t.start_date)}</span><div class="gantt-bar ${issue?'live':''}" style="left:${left}%;width:${width}%" title="${esc(t.start_date)} → ${esc(t.target_date)}"></div></div></div>`}).join('')||'<div class="empty">No scheduled tasks match the filter.</div>'};
  for(const id of ['gq','gphase','gtrack'])document.querySelector('#'+id).addEventListener(id==='gq'?'input':'change',e=>{f[id==='gq'?'q':id.slice(1)]=e.target.value;draw()});draw();
}
function api(){nav('api');app.innerHTML=`<div class="sectionhead"><div><div class="eyebrow">Public APIs and datasets</div><h1>API</h1></div></div><div class="grid"><a class="item" href="https://api.github.com/repos/${R}/issues"><span class="id">GET</span><h3>GitHub Issues API</h3><p class="small">Live mutable work records.</p></a><a class="item" href="https://raw.githubusercontent.com/${R}/main/data/tasks.csv.gz"><span class="id">GZIP CSV</span><h3>327-item task catalog</h3><p class="small">Versioned baseline and interchange dataset.</p></a><a class="item" href="https://api.github.com/repos/${R}/contents/knowledge"><span class="id">GET</span><h3>Knowledge contents</h3></a><a class="item" href="${gh('/actions')}"><span class="id">ACTIONS</span><h3>Import and validation workflows</h3></a></div>`}
function route(){const p=location.hash.slice(1)||'home';p==='wiki'?wiki():p==='tasks'?tasks():p==='gantt'?gantt():p==='api'?api():home();scrollTo(0,0)}addEventListener('hashchange',route);boot();
</script>
</body>
</html>
