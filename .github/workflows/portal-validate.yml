name: Validate portal and knowledge base

on:
  pull_request:
    paths:
      - 'portal/**'
      - 'knowledge/**'
      - 'docs/**'
      - 'data/**'
      - '.github/workflows/portal-validate.yml'
  push:
    branches: [main]
    paths:
      - 'portal/**'
      - 'knowledge/**'
      - 'docs/**'
      - 'data/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate portal and document structure
        shell: python
        run: |
          from pathlib import Path
          import re
          import sys

          required = [
              Path('portal/index.html'),
              Path('portal/style.css'),
              Path('portal/data.js'),
              Path('portal/app.js'),
              Path('portal/manifest.webmanifest'),
              Path('vercel.json'),
              Path('knowledge/BRIEFING.md'),
              Path('knowledge/docs/INDEX.md'),
              Path('data/tasks/index.json'),
              Path('data/TASK-CATALOG.md'),
          ]
          errors = [f'Missing required file: {p}' for p in required if not p.exists()]

          ids = {}
          for path in Path('knowledge').rglob('*.md'):
              text = path.read_text(encoding='utf-8')
              match = re.search(r'(?m)^id:\s*([A-Z0-9-]+)\s*$', text[:1500])
              if not match:
                  errors.append(f'Missing front-matter id: {path}')
                  continue
              doc_id = match.group(1)
              if doc_id in ids:
                  errors.append(f'Duplicate id {doc_id}: {ids[doc_id]} and {path}')
              ids[doc_id] = path

          portal = '\n'.join(Path(p).read_text(encoding='utf-8') for p in ('portal/index.html','portal/data.js','portal/app.js'))
          for section in ('Wiki', 'Tasks', 'Gantt', 'API'):
              if section not in portal:
                  errors.append(f'Portal section missing: {section}')
          if 'Public engineering workspace for Agent OS.' not in portal:
              errors.append('Portal headline is missing or changed unexpectedly.')
          if 'An engineering operating system for building an operating system.' in portal:
              errors.append('Ambiguous old portal headline is still present.')
          if 'data/tasks/' not in portal or 'index.json' not in portal:
              errors.append('Portal does not load the JSON task catalog.')
          if 'tasks.csv.gz' in portal or 'DecompressionStream' in portal:
              errors.append('Obsolete compressed task-catalog loader is still present.')

          forbidden_markers = {
              'final-marker.txt', 'ready.txt', 'no-more-files.txt', 'pr-ready.txt',
              'pr-state.txt', 'STOP', '.scaffold-complete', 'task-count.txt',
              'document-count.txt', 'phase-count.txt', 'complete.txt',
          }
          for path in Path('portal').iterdir():
              if path.name in forbidden_markers:
                  errors.append(f'Temporary marker file is tracked: {path}')

          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'Validated {len(ids)} identified Markdown documents and portal structure.')

      - name: Validate open 327-task JSON catalog
        shell: python
        run: |
          from pathlib import Path
          import json
          import sys

          index = json.loads(Path('data/tasks/index.json').read_text(encoding='utf-8'))
          errors = []
          tasks = []
          for entry in index.get('files', []):
              path = Path('data/tasks') / entry['file']
              if not path.exists():
                  errors.append(f"Missing task shard: {path}")
                  continue
              rows = json.loads(path.read_text(encoding='utf-8'))
              if not isinstance(rows, list):
                  errors.append(f"Task shard is not a list: {path}")
                  continue
              if len(rows) != entry['count']:
                  errors.append(f"Task shard count mismatch for {path}: expected {entry['count']}, found {len(rows)}")
              tasks.extend(rows)

          if len(tasks) != index.get('count'):
              errors.append(f"Expected {index.get('count')} task records, found {len(tasks)}")
          if len(tasks) != 327:
              errors.append(f'Expected 327 task records, found {len(tasks)}')
          task_ids = [row.get('id', '') for row in tasks]
          if len(task_ids) != len(set(task_ids)):
              errors.append('Task catalog contains duplicate IDs.')
          invalid = [task_id for task_id in task_ids if not task_id.startswith('AOS-')]
          if invalid:
              errors.append(f'Task catalog contains invalid IDs: {invalid[:5]}')

          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'Validated {len(tasks)} unique task records across {len(index["files"])} JSON shards.')

      - name: Check publication hygiene and syntax markers
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool vercel.json >/dev/null
          python -m json.tool portal/manifest.webmanifest >/dev/null
          python -m json.tool data/tasks/index.json >/dev/null
          node --check portal/data.js
          node --check portal/app.js
          grep -q '<!doctype html>' portal/index.html
          grep -q 'api.github.com/repos' portal/data.js
          if git ls-files '*.zip' '*.pdf' '*.gz' | grep -q .; then
            echo 'ZIP, PDF, or gzip artifacts must not be committed.' >&2
            git ls-files '*.zip' '*.pdf' '*.gz' >&2
            exit 1
          fi
