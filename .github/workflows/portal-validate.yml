name: Validate portal and knowledge base

on:
  pull_request:
    paths:
      - 'portal/**'
      - 'knowledge/**'
      - 'docs/**'
      - 'data/**'
      - '.github/workflows/portal-validate.yml'
  push:
    branches: [main]
    paths:
      - 'portal/**'
      - 'knowledge/**'
      - 'docs/**'
      - 'data/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate portal and document structure
        shell: python
        run: |
          from pathlib import Path
          import re
          import sys

          required = [
              Path('portal/index.html'),
              Path('portal/manifest.webmanifest'),
              Path('vercel.json'),
              Path('knowledge/BRIEFING.md'),
              Path('knowledge/docs/INDEX.md'),
              Path('data/tasks.csv.gz'),
              Path('data/TASK-CATALOG.md'),
          ]
          errors = [f'Missing required file: {p}' for p in required if not p.exists()]

          ids = {}
          for path in Path('knowledge').rglob('*.md'):
              text = path.read_text(encoding='utf-8')
              match = re.search(r'(?m)^id:\s*([A-Z0-9-]+)\s*$', text[:1500])
              if not match:
                  errors.append(f'Missing front-matter id: {path}')
                  continue
              doc_id = match.group(1)
              if doc_id in ids:
                  errors.append(f'Duplicate id {doc_id}: {ids[doc_id]} and {path}')
              ids[doc_id] = path

          portal = Path('portal/index.html').read_text(encoding='utf-8')
          for section in ('Wiki', 'Tasks', 'Gantt', 'API'):
              if section not in portal:
                  errors.append(f'Portal section missing: {section}')
          if 'Public engineering workspace for Agent OS.' not in portal:
              errors.append('Portal headline is missing or changed unexpectedly.')
          if 'An engineering operating system for building an operating system.' in portal:
              errors.append('Ambiguous old portal headline is still present.')
          if 'tasks.csv.gz' not in portal or 'DecompressionStream' not in portal:
              errors.append('Portal does not load the public task catalog.')

          forbidden_markers = {
              'final-marker.txt', 'ready.txt', 'no-more-files.txt', 'pr-ready.txt',
              'pr-state.txt', 'STOP', '.scaffold-complete', 'task-count.txt',
              'document-count.txt', 'phase-count.txt', 'complete.txt',
          }
          for path in Path('portal').iterdir():
              if path.name in forbidden_markers:
                  errors.append(f'Temporary marker file is tracked: {path}')

          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print(f'Validated {len(ids)} identified Markdown documents and portal structure.')

      - name: Check gzip container integrity
        shell: bash
        run: |
          set -euo pipefail
          ls -lh data/tasks.csv.gz
          gzip -t data/tasks.csv.gz

      - name: Check task record count
        shell: python
        run: |
          import csv
          import gzip
          import sys
          with gzip.open('data/tasks.csv.gz', 'rt', encoding='utf-8-sig', newline='') as fh:
              tasks = list(csv.DictReader(fh))
          print(f'Found {len(tasks)} task records.')
          if len(tasks) != 327:
              sys.exit(f'Expected 327 task records, found {len(tasks)}.')

      - name: Check task identifiers
        shell: python
        run: |
          import csv
          import gzip
          import sys
          with gzip.open('data/tasks.csv.gz', 'rt', encoding='utf-8-sig', newline='') as fh:
              tasks = list(csv.DictReader(fh))
          task_ids = [row.get('task_id', '') for row in tasks]
          if len(task_ids) != len(set(task_ids)):
              sys.exit('Task catalog contains duplicate task_id values.')
          invalid = [task_id for task_id in task_ids if not task_id.startswith('AOS-')]
          if invalid:
              sys.exit(f'Task catalog contains invalid task_id values: {invalid[:5]}')
          print(f'Validated {len(task_ids)} unique AOS task identifiers.')

      - name: Check publication hygiene and syntax markers
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool vercel.json >/dev/null
          python -m json.tool portal/manifest.webmanifest >/dev/null
          grep -q '<!doctype html>' portal/index.html
          grep -q 'api.github.com/repos' portal/index.html
          if git ls-files '*.zip' '*.pdf' | grep -q .; then
            echo 'ZIP or PDF artifacts must not be committed.' >&2
            git ls-files '*.zip' '*.pdf' >&2
            exit 1
          fi
